name: buildfork

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://okan-demo-app.surge.sh
    steps:
    - name: Download the Build Artifact
      uses: actions/download-artifact@latest
      with:
        name: build
    - name: deploy to surge
      run: npx surge --project '.' --domain okan-demo-app.surge.sh
      env:
        SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
        SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}


  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: cache
        uses: actions/cache@v5.0.5
        with:
          path: ~/.npm
          key: buildCache

      - run: npm ci

      - run: npm test -- --coverage
        env:
          CI: true

      - name: Upload code coverage
        uses: actions/upload-artifact@latest
        with:
          name: codecoverage
          path: coverage

      - name: build
        run: npm run build

      - name: upload build files
        uses: actions/upload-artifact@latest
        with:
          name: build
          path: build
